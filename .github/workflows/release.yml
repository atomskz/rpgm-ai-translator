name: Release

# Publish to npm when a version tag is pushed. The publish job is gated on the
# same verify checks CI runs, and uses npm provenance (a signed, public build
# attestation linking the package to this workflow run and commit).
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20.19.0", "22", "24"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run coverage
      - run: npm run build

  publish:
    name: Publish to npm
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm provenance: lets npm request a short-lived OIDC token to
      # sign the build attestation.
      id-token: write
    # Exposed at the job level so a step `if:` can check whether publishing is
    # configured (a step's own env is not readable in its `if:`).
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20.19.0"
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - name: Check the tag matches package.json version
        run: |
          pkg="v$(node -p "require('./package.json').version")"
          if [ "$pkg" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${pkg}." >&2
            echo "Bump the version and re-tag so the published version matches the tag." >&2
            exit 1
          fi
      # Skip (don't fail) when no npm token is configured, so a tag push does not
      # red-X the release when npm publishing is not set up. Add an npm automation
      # (or granular publish) token as the NPM_TOKEN repository secret to enable it.
      - name: Check npm token is configured
        id: token
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::warning::NPM_TOKEN secret is not set; skipping npm publish. Add it (repo Settings > Secrets > Actions) and re-run this job to publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      # prepublishOnly runs typecheck/lint/test and prepack builds dist; publish
      # with provenance (requires id-token: write above) to a public package.
      - name: Publish
        if: ${{ steps.token.outputs.skip != 'true' }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
