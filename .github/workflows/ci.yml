name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20.19.0", "22", "24"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  package:
    name: Package smoke test
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20.19.0"
          cache: npm
      - run: npm ci
      - name: Pack (prepack builds dist)
        run: npm pack
      - name: Install the tarball into a clean project and run the binary
        run: |
          tarball="$(ls rpgm-ai-translator-*.tgz)"
          workdir="$(mktemp -d)"
          cd "$workdir"
          npm init -y >/dev/null 2>&1
          npm install "$GITHUB_WORKSPACE/$tarball"
          ./node_modules/.bin/rpgm-ai-translator --help
      - name: Upload package tarball
        uses: actions/upload-artifact@v7
        with:
          name: rpgm-ai-translator-tarball
          path: rpgm-ai-translator-*.tgz
          retention-days: 14
